---
- name: Install Vector dependencies
  ansible.builtin.apt:
    name: "{{ vector_apt_dependencies }}"
    state: present
    update_cache: true

- name: Download Datadog GPG keys for Vector repository
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: "/tmp/{{ item | basename }}"
    mode: "0644"
  loop: "{{ vector_datadog_keys }}"

- name: Create Vector keyring
  ansible.builtin.command:
    cmd: >-
      gpg --no-default-keyring
      --keyring /usr/share/keyrings/datadog-archive-keyring.gpg
      --import
      /tmp/DATADOG_APT_KEY_CURRENT.public
      /tmp/DATADOG_APT_KEY_F14F620E.public
      /tmp/DATADOG_APT_KEY_C0962C7D.public
  args:
    creates: /usr/share/keyrings/datadog-archive-keyring.gpg

- name: Set permissions on Vector keyring
  ansible.builtin.file:
    path: /usr/share/keyrings/datadog-archive-keyring.gpg
    mode: "0644"
    state: file

- name: Add Vector repository
  ansible.builtin.apt_repository:
    repo: "{{ vector_apt_repo }}"
    state: present
    filename: vector
    update_cache: true

- name: Install Vector
  ansible.builtin.apt:
    name: vector
    state: "{{ vector_package_state }}"
    update_cache: true

- name: Create Vector config directory
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Vector config
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_file }}"
    mode: "0644"
  notify: Restart vector

- name: Ensure Vector service is enabled and started
  ansible.builtin.service:
    name: vector
    enabled: "{{ vector_service_enabled }}"
    state: "{{ vector_service_state }}"
